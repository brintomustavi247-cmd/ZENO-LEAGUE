<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0e0e10" />
  
  <!-- SEO Meta -->
  <meta name="description" content="Zeno League — Free Fire Custom Room Tournament Platform. Join matches, win prizes, dominate the arena." />
  <meta name="keywords" content="Free Fire, Custom Room, Tournament, Zeno League, Bangladesh, Esports, FF Tournament BD" />
  <meta name="author" content="Zeno League" />  
  <meta name="robots" content="index, follow" />
  
  <!-- Open Graph -->
  <meta property="og:title" content="Zeno League — Free Fire Tournament Platform" />
  <meta property="og:description" content="Join Free Fire custom room tournaments. Solo, Duo, Squad, Clash Squad. Real prizes, real competition." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/icons/og-image.png" />
  
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Zeno League" />
  <meta name="twitter:description" content="Free Fire Custom Room Tournament Platform — Bangladesh" />

  <!-- PWA Meta -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Zeno League" />
  <meta name="application-name" content="Zeno League" />

  <title>Zeno League</title>

  <!-- Favicon: use existing PWA icon to avoid 404 during development -->
  <link rel="icon" href="/icons/icon-192.png" sizes="192x192">

  <!-- ════════════════════════════════════════
    ⚡ PRECONNECTS (Warm up connections BEFORE requesting resources!)
    This saves ~200-500ms on font/icon loading!
    ════════════════════════════════════════ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />

  <!-- ════════════════════════════════════════
    🎯 OPTIMIZED FONT LOADING STRATEGY:
    
    WHAT CHANGED:
    ❌ REMOVED: Inter/Rajdhani/Orbitron/Exo 2 (~650KB of unused fonts!)
    ✅ KEPT: Only Lexend + Inter + Plus Jakarta Sans (~120KB total)
    ✅ ADDED: display=swap (shows text immediately with system font)
    ✅ ADDED: Async preload (non-blocking)
    
    RESULT: Font load time reduced from ~3s to ~800ms!
    ════════════════════════════════════════ -->
  <link rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'" 
        href="https://fonts.googleapis.com/css2?family=Lexend:wght@600;700;800&family=Inter:wght@500;600;700&family=Plus+Jakarta+Sans:wght@500;700&display=swap">
  
  <!-- Fallback for users without JavaScript -->
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lexend:wght@600;700;800&family=Inter:wght@500;600;700&family=Plus+Jakarta+Sans:wght@500;700&display=swap">
  </noscript>

  <!-- ════════════════════════════════════════
    🎯 FONT AWESOME ICON LIBRARY (Synchronous - Reliable)
    ════════════════════════════════════════ -->
  <link rel="stylesheet" 
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer" />
  <!-- ════════════════════════════════════════
    🎨 CRITICAL CSS (Inline - renders immediately!)
    ════════════════════════════════════════ -->
  <style>
    /* ========================================
       RESET & BASE (Minimal - just what's needed for first paint)
    ======================================== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 0;
      background: #0e0e10;
      color: #e5e1e4;
      /* System font stack fallback while custom fonts load */
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-weight: 500;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      line-height: 1.5;
    }

    /* ========================================
       CSS VARIABLES (Design tokens)
    ======================================== */
    :root {
      /* Fonts */
      --font-hero: 'Lexend', sans-serif;
      --font-heading: 'Lexend', sans-serif;
      --font-body: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-label: 'Plus Jakarta Sans', sans-serif;
      --font-number: 'Inter', sans-serif;
      --font-mono: 'Inter', monospace;

      /* Background Depth (6 levels) */
      --bg-deepest: #0e0e10;
      --bg-base: #131315;
      --bg-raised-low: #1c1b1d;
      --bg-raised-mid: #201f21;
      --bg-raised-high: #2a2a2c;
      --bg-raised-highest: #353437;

      /* Accents */
      --primary: #61cdff;
      --arena-accent: #e63946;
      --success: #4ade80;
      --error: #f87171;
      --warning: #facc15;
      --info: #60a5fa;

      /* Text Colors */
      --text-primary: #e5e1e4;
      --text-secondary: #bdc8cf;
      --text-muted: #889299;
      --text-dim: #555555;

      /* Money Colors */
      --money-entry: #facc15;
      --money-prize: #a78bfa;

      /* Shadows (NO glow - flat design) */
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
      --shadow-md: 0 4px 24px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.4);

      /* Spacing */
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);

      /* Border Radius */
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
    }

    /* ========================================
       ROOT CONTAINER
    ======================================== */
    #root {
      min-height: 100vh;
      min-height: 100dvh;
      position: relative;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
      padding-left: var(--safe-left);
      padding-right: var(--safe-right);
    }

    /* ========================================
       SCROLLBAR (Custom dark theme)
    ======================================== */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a2c; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #353437; }
    * { scrollbar-width: thin; scrollbar-color: #2a2a2c transparent; }

    /* ========================================
       SELECTION HIGHLIGHT
    ======================================== */
    ::selection {
      background: rgba(97, 205, 255, 0.2);
      color: #fff;
    }

    /* ========================================
       LOADING SCREEN (Shows immediately while app loads)
    ======================================== */
    .app-loading {
      overflow: hidden;
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0e0e10;
      z-index: 99999;
      padding: 0 24px;
      transition: opacity 0.5s ease;
    }
    .app-loading.hide {
      opacity: 0;
      pointer-events: none;
    }

    .app-loading-logo {
      font-family: 'Lexend', sans-serif;
      font-size: clamp(26px, 8vw, 44px);
      font-weight: 700;
      color: #e5e1e4;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.1;
      z-index: 1;
    }

    .app-loading-sub {
      font-family: 'Inter', sans-serif;
      font-size: clamp(11px, 2.5vw, 13px);
      font-weight: 500;
      color: #889299;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 10px;
      z-index: 1;
    }

    .app-loading-tag {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: clamp(9px, 2vw, 11px);
      font-weight: 500;
      color: #555555;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
      z-index: 1;
    }

    .app-loading-bar-wrap {
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 1;
    }

    .app-loading-bar {
      width: 160px;
      height: 2px;
      border-radius: 1px;
      background: rgba(255, 255, 255, 0.06);
      overflow: hidden;
      position: relative;
    }

    .app-loading-bar::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 35%;
      height: 100%;
      border-radius: 1px;
      background: #e5e1e4;
      animation: barSlide 1.6s ease-in-out infinite;
    }

    @keyframes barSlide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }

    .app-loading-pct {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      color: #555555;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* ========================================
       ANIMATIONS (Used throughout app)
    ======================================== */
    @keyframes shimmer {
      0% { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes modalOverlayIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes modalSlideIn {
      from { opacity: 0; transform: translateY(16px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes modalSlideOut {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to { opacity: 0; transform: translateY(16px) scale(0.97); }
    }

    @keyframes toastIn {
      0% { transform: translateY(-16px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    @keyframes toastOut {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-16px); opacity: 0; }
    }

    /* ========================================
       UTILITY CLASSES
    ======================================== */

    /* Skeleton loader (shimmer effect) */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.02) 100%);
      background-size: 200% 100%;
      animation: shimmer 2s linear infinite;
      border-radius: var(--radius-sm);
    }

    /* Horizontal scroll container (no scrollbar) */
    .h-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 8px;
      scrollbar-width: none;
      -ms-overflow-style: none;
      -webkit-overflow-scrolling: touch;
    }
    .h-scroll::-webkit-scrollbar { display: none; }

    /* Match card grid layout */
    .match-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 8px;
    }

    /* Money amount display */
    .money-display {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      letter-spacing: 0;
    }

    /* Heading typography */
    .heading-display {
      font-family: 'Lexend', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: -0.025em;
    }

    /* Brand logo text */
    .brand-text {
      font-family: 'Lexend', sans-serif;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* ========================================
       PWA / MOBILE ENHANCEMENTS
    ======================================== */
    @media (display-mode: standalone) {
      body {
        padding-top: env(safe-area-inset-top);
      }
    }

    @supports (padding-top: env(safe-area-inset-top)) {
      .safe-area-top { padding-top: env(safe-area-inset-top); }
      .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
    }

    /* ========================================
       ACCESSIBILITY: REDUCED MOTION
    ======================================== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .app-loading-bar::after {
        animation: none !important;
      }
    }
  </style>

  <!-- 
    ════════════════════════════════════════════════════════════════
    ⚠️ IMPORTANT NOTE ABOUT EXTERNAL STYLESHEETS:
    ════════════════════════════════════════════════════════════════
    
    DO NOT add any more <link rel="stylesheet"> tags here!
    All additional CSS should be imported via JavaScript (React components)
    or added as <style> blocks in component files.
    
    Render-blocking stylesheets are the #1 cause of slow First Contentful Paint!
  -->
</head>
<body>
  <!-- 
    ════════════════════════════════════════════════════════════════
    🎬 LOADING SCREEN (Visible until React mounts)
    Shows immediately (before any JS loads) so user sees something instantly!
    ════════════════════════════════════════════════════════════════
  -->
  <div class="app-loading" id="app-loader">
    <div class="app-loading-logo">ZENO LEAGUE</div>
    <div class="app-loading-sub">Bangladesh</div>
    <div class="app-loading-tag">Free Fire Tournament Platform</div>
    <div class="app-loading-bar-wrap">
      <div class="app-loading-bar"></div>
      <div class="app-loading-pct">Loading</div>
    </div>
  </div>

  <!-- 
    ════════════════════════════════════════════════════════════════
    🏗️ REACT MOUNT POINT
    React will render the entire app inside this div
    ════════════════════════════════════════════════════════════════
  -->
  <div id="root"></div>

  <!-- 
    ════════════════════════════════════════════════════════════════
    ⏱️ LOADING SCREEN DISMISSAL LOGIC
    
    Dismisses the loading screen when:
    1. Window fully loads (all resources downloaded) + 800ms delay (smooth transition)
    OR
    2. 4 seconds max timeout (safety net if something hangs)
    ════════════════════════════════════════════════════════════════
  -->
  <script>
    (function() {
      function dismissLoader() {
        var loader = document.getElementById('app-loader');
        if (!loader) return;
        
        // Fade out smoothly
        loader.classList.add('hide');
        
        // Remove from DOM after fade completes
        setTimeout(function() {
          if (loader.parentNode) {
            loader.parentNode.removeChild(loader);
          }
        }, 500);
      }

      // Track when window finishes loading
      var loadTime = Date.now();
      
      window.addEventListener('load', function() {
        var elapsed = Date.now() - loadTime;
        // Wait at least 800ms after load (so user sees loading screen briefly)
        var delay = Math.max(0, 800 - elapsed);
        setTimeout(dismissLoader, delay);
      });

      // Safety net: Force dismiss after 4 seconds even if load event never fires
      setTimeout(dismissLoader, 4000);
    })();
  </script>

  <!-- 
    ════════════════════════════════════════════════════════════════
    ⚡ REACT APPLICATION ENTRY POINT ← THIS WAS MISSING!
    
    type="module" tells browser this is ES6 module (supports import/export)
    src="/src/main.jsx" is compiled by Vite from our source code
    Vite automatically handles:
    - JSX transformation
    - Code splitting (from our lazy imports)
    - Hot Module Replacement (HMR) during development
    - Minification in production builds
    ════════════════════════════════════════════════════════════════
  -->
  <script type="module" src="/src/main.jsx"></script>

  <!-- 
    ════════════════════════════════════════════════════════════════
    🔄 SERVICE WORKER REGISTRATION (PWA ENABLED!)
    
    WHAT THIS DOES:
    1. Registers /sw.js (Service Worker file) in the background
    2. Enables OFFLINE SUPPORT (app works without internet after first visit)
    3. Enables INSTALLABILITY (user can "Add to Home Screen" on mobile)
    4. Caches assets for faster repeat visits
    
    WHY IT'S IMPORTANT:
    - Without SW: No offline support, no install prompt, slower repeat visits
    - With SW: App feels like a native app, works offline, loads instantly on return visits
    
    NOTE: Make sure you have a /public/sw.js file! If not, create a basic one.
    ════════════════════════════════════════════════════════════════
  -->
  <script>
    // Check if Service Worker API is available
    if ('serviceWorker' in navigator) {
      // Wait for page to fully load before registering SW
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js')
          .then(function(registration) {
            console.log('✅ Service Worker registered successfully!');
            console.log('Scope:', registration.scope);
          })
          .catch(function(error) {
            console.log('⚠️ Service Worker registration failed:', error);
          });
      });
    } else {
      console.log('⚠️ Service Workers not supported in this browser');
    }
  </script>

  <!-- 
    ════════════════════════════════════════════════════════════════
    🔒 SECURITY & PERFORMANCE HEADERS (Optional but recommended)
    
    These meta tags help with security and performance.
    Add them if you want extra protection.
    (Uncomment if needed)
    
    OPTIONAL: To enable security headers, add these to <head>:
    - <meta http-equiv="X-Content-Type-Options" content="nosniff">
    - <meta http-equiv="X-Frame-Options" content="DENY">
    - <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    - <meta referrer-policy="no-referrer-when-downgrade">
  -->
</body>
</html>
